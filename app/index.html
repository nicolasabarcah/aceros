<!DOCTYPE html>
<html lang="es-CL">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aceros APP | Cuentas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/main.css?v=20260416-1" />
    <script src="assets/js/components/app-menu.js?v=20260416-1" defer></script>
    <script type="module" src="assets/js/pages/dashboard.js?v=20260416-1"></script>
</head>

<body>
    <div class="app-shell d-lg-flex">
        <div data-app-menu data-menu-src="menu.html" data-menu-active="resumen"></div>

        <main class="main-content flex-grow-1">
            <section class="header-card">
                <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
                    <div>
                        <h1 class="page-title">Hola, Usuario</h1>
                        <p class="page-subtitle">Aquí tienes un resumen claro de tus finanzas personales.</p>
                    </div>
                    <div class="d-flex align-items-center gap-2 flex-wrap header-actions">
                        <div class="month-nav" aria-label="Navegador mensual general" style="margin-top: 2px;">
                            <button id="headerMonthPrev" type="button" class="month-nav__btn" aria-label="Mes anterior">
                                <i class="bi bi-chevron-left"></i>
                            </button>
                            <div id="headerMonthLabel" class="month-nav__label" aria-live="polite" role="button" tabindex="0" aria-label="Volver al mes actual" data-month="" data-year=""></div>
                            <button id="headerMonthNext" type="button" class="month-nav__btn" aria-label="Mes siguiente">
                                <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <div id="pageNotice" class="d-none"></div>

            <section class="mb-4">
                <div class="d-flex align-items-center justify-content-between mb-3 mx-1">
                    <h3 class="section-title">Cuentas</h3>
                    <small id="accountsCount" class="table-info">0 activas</small>
                </div>
                <!-- Cuentas -->
                <div id="accountsGrid" class="row g-3"></div>
            </section>
            
            <!-- Balances -->
            <section class="mb-4">
                <div class="row g-4">
                    <div class="col-md-4">
                        <article class="summary-card">
                            <div class="d-flex align-items-center justify-content-between">
                                <div>
                                    <p class="summary-label">Saldo Total</p>
                                    <h2 id="summaryBalanceTotal" class="summary-value">$ 0</h2>
                                </div>
                                <span class="summary-icon summary-icon-total">
                                    <i class="bi bi-wallet2"></i>
                                </span>
                            </div>
                        </article>
                    </div>

                    <div class="col-md-4">
                        <article class="summary-card">
                            <div class="d-flex align-items-center justify-content-between">
                                <div>
                                    <p class="summary-label">Ingresos del Mes</p>
                                    <h2 id="summaryIncomeMonth" class="summary-value">$ 0</h2>
                                </div>
                                <span class="summary-icon summary-icon-income">
                                    <i class="bi bi-arrow-up-left"></i>
                                </span>
                            </div>
                        </article>
                    </div>

                    <div class="col-md-4">
                        <article class="summary-card">
                            <div class="d-flex align-items-center justify-content-between">
                                <div>
                                    <p class="summary-label">Gastos del Mes</p>
                                    <h2 id="summaryExpenseMonth" class="summary-value">$ 0</h2>
                                </div>
                                <span class="summary-icon summary-icon-expense">
                                    <i class="bi bi-arrow-down-right"></i>
                                </span>
                            </div>
                        </article>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
